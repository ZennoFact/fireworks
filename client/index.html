<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fireworks 3D | KCG Open Campus</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="stage">
        <canvas id="canvas"></canvas>
    </div>

        var w = window.innerWidth;
        var h = window.innerHeight;
        var canvas = document.getElementById("canvas");
        canvas.width = w;
        canvas.height = h;
    </script>
</body>
</html>
